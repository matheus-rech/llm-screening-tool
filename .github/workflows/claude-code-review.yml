name: Claude Code Review and Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      focus_area:
        description: 'Specific area to focus on (e.g., testing, security, performance)'
        required: false
        default: 'general'

jobs:
  code_review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v2
        with:
          languages: javascript
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      id: tests
      run: |
        python -m pytest -v --tb=short > test_results.txt 2>&1 || echo "TESTS_FAILED=true" >> $GITHUB_ENV
        cat test_results.txt
    
    - name: Run basic linting
      id: lint
      run: |
        python -m py_compile app.py rag.py config_manager.py || echo "LINT_FAILED=true" >> $GITHUB_ENV
    
    - name: Get changed files
      id: changed-files
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > changed_files.txt
        else
          git diff --name-only HEAD~1 HEAD > changed_files.txt
        fi
        echo "Changed files:"
        cat changed_files.txt
    
    - name: Claude Code Review
      uses: anthropics/claude-code-review@v1
      with:
        anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        focus-area: ${{ github.event.inputs.focus_area || 'general' }}
        review-prompt: |
          Please review this LLM screening tool for systematic reviews. Focus on:
          
          1. **Code Quality & Architecture**:
             - Review code structure and design patterns
             - Check for proper error handling and logging
             - Validate database operations and migrations
             - Assess API integration patterns
          
          2. **Security & Best Practices**:
             - API key handling and secrets management
             - Input validation and sanitization
             - File upload security
             - Database security practices
          
          3. **Performance & Scalability**:
             - Concurrent processing efficiency
             - Database query optimization
             - Memory usage patterns
             - API rate limiting implementation
          
          4. **Testing & Reliability**:
             - Test coverage and quality
             - Error scenarios coverage
             - Edge case handling
             - Integration test completeness
          
          5. **Documentation & Maintainability**:
             - Code documentation quality
             - Configuration management
             - Deployment considerations
             - User documentation completeness
          
          **Project Context**:
          This is a Python Flask application that uses dual LLM models (conservative/liberal) 
          to screen academic papers for systematic reviews. It processes various file formats 
          (RIS, BibTeX, CSV, XML) and provides conflict resolution for disagreements between models.
          
          **Recent Improvements Made**:
          - Added comprehensive testing framework with pytest
          - Implemented robust error handling with retry logic
          - Added database migration system with Flask-Migrate
          - Optimized concurrency and threading performance
          - Enhanced configuration management with validation
          
          Please provide specific, actionable feedback and suggestions for improvement.
        
        max-files: 20
        exclude-patterns: |
          *.pyc
          __pycache__/*
          .git/*
          test_data/*
          uploads/*
          results/*
    
    - name: Comment test results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let comment = '## 🤖 Automated Quality Check Results\n\n';
          
          // Test results
          if (process.env.TESTS_FAILED === 'true') {
            comment += '❌ **Tests Failed**\n';
            try {
              const testResults = fs.readFileSync('test_results.txt', 'utf8');
              comment += '```\n' + testResults.slice(-2000) + '\n```\n\n';
            } catch (e) {
              comment += 'Could not read test results.\n\n';
            }
          } else {
            comment += '✅ **All Tests Passed**\n\n';
          }
          
          // Lint results
          if (process.env.LINT_FAILED === 'true') {
            comment += '⚠️ **Linting Issues Found**\n';
            comment += 'Please check syntax errors in Python files.\n\n';
          } else {
            comment += '✅ **No Syntax Errors**\n\n';
          }
          
          comment += '---\n';
          comment += '*Claude Code Review will provide detailed feedback above.*';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
    
    - name: Create issue for failed checks
      if: failure() && github.event_name == 'push'
      uses: actions/github-script@v7
      with:
        script: |
          const title = `Quality Check Failed - ${context.sha.slice(0, 7)}`;
          const body = `
          ## Quality Check Failure Report
          
          **Commit**: ${context.sha}
          **Branch**: ${context.ref}
          **Workflow Run**: ${context.runId}
          
          ### Issues Detected:
          ${process.env.TESTS_FAILED === 'true' ? '- ❌ Tests failed' : ''}
          ${process.env.LINT_FAILED === 'true' ? '- ❌ Linting issues' : ''}
          
          Please review the workflow run for detailed information.
          
          @${context.actor} - This requires your attention.
          `;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['bug', 'quality-check', 'automated']
          });

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Bandit Security Scan
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Security Scan Results
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          try {
            const report = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
            
            if (report.results && report.results.length > 0) {
              let comment = '## 🔒 Security Scan Results\n\n';
              comment += `Found ${report.results.length} potential security issues:\n\n`;
              
              report.results.slice(0, 5).forEach((issue, index) => {
                comment += `### Issue ${index + 1}: ${issue.test_name}\n`;
                comment += `**Severity**: ${issue.issue_severity}\n`;
                comment += `**File**: ${issue.filename}:${issue.line_number}\n`;
                comment += `**Details**: ${issue.issue_text}\n\n`;
              });
              
              if (report.results.length > 5) {
                comment += `... and ${report.results.length - 5} more issues. Check the full report.\n\n`;
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
          } catch (e) {
            console.log('No security report generated or parsing failed');
          }
