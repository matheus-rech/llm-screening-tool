services:
  - type: web
    name: llm-screening-tool
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENTREZ_EMAIL
        sync: false
    disk:
      name: llm-screening-data
      mountPath: /app/data
      sizeGB: 1